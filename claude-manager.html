<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code Manager</title>
<style>
  :root {
    --bg:    #0f1117;
    --bg2:   #1a1d27;
    --bg3:   #222535;
    --border:#2e3248;
    --accent:#7c6af7;
    --accent2:#5b4fd4;
    --accent-glow:rgba(124,106,247,0.15);
    --text:  #e2e4f0;
    --text2: #8b90b0;
    --text3: #555a78;
    --green: #4ade80;
    --amber: #f59e0b;
    --select:rgba(124,106,247,0.18);
    --font:  'JetBrains Mono','Cascadia Code','Fira Code',monospace;
    --font-ui:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
    --radius:8px;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:var(--font-ui); font-size:13px; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

  /* Top bar */
  .topbar { background:var(--bg2); border-bottom:1px solid var(--border); padding:10px 16px; display:flex; align-items:center; gap:12px; flex-shrink:0; }
  .topbar-logo { display:flex; align-items:center; gap:8px; font-size:14px; font-weight:600; color:var(--text); letter-spacing:-0.3px; white-space:nowrap; }
  .topbar-logo svg { color:var(--accent); flex-shrink:0; }
  .topbar-sep { width:1px; height:18px; background:var(--border); flex-shrink:0; }
  .dir-row { display:flex; align-items:center; gap:8px; flex:1; min-width:0; }
  .dir-label { color:var(--text2); white-space:nowrap; font-size:12px; }
  .dir-col { flex:1; display:flex; flex-direction:column; gap:3px; min-width:0; }
  .dir-path { background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius); padding:5px 10px; color:var(--text2); font-family:var(--font); font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .dir-path.set { color:var(--accent); border-color:var(--accent2); }
  .dir-hint { font-family:var(--font); font-size:10px; color:var(--text3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding-left:2px; }
  .dir-hint strong { color:var(--text2); }

  /* Buttons */
  .btn { background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); padding:5px 12px; font-size:12px; cursor:pointer; white-space:nowrap; transition:all 0.15s; font-family:var(--font-ui); }
  .btn:hover { background:var(--bg2); border-color:var(--accent); color:var(--accent); }
  .btn-primary { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:500; }
  .btn-primary:hover { background:var(--accent2); border-color:var(--accent2); color:#fff; }
  .btn-primary:disabled { background:var(--bg3); border-color:var(--border); color:var(--text3); cursor:not-allowed; }

  /* Mode tabs */
  .modetabs { background:var(--bg2); border-bottom:1px solid var(--border); padding:0 16px; display:flex; align-items:flex-end; gap:0; flex-shrink:0; }
  .modetab { padding:8px 18px; font-size:12px; font-weight:500; cursor:pointer; color:var(--text3); border-bottom:2px solid transparent; transition:all 0.15s; display:flex; align-items:center; gap:6px; }
  .modetab:hover { color:var(--text2); }
  .modetab.active { color:var(--text); border-bottom-color:var(--accent); }
  .modetab .dot { width:6px; height:6px; border-radius:50%; background:var(--text3); }
  .modetab.active .dot { background:var(--accent); }
  #agentsTab .dot { background:var(--text3); }
  #agentsTab.active .dot { background:var(--amber); }

  /* Stats bar */
  .statsbar { background:var(--bg2); border-bottom:1px solid var(--border); padding:6px 16px; display:flex; align-items:center; gap:16px; flex-shrink:0; }
  .stat { display:flex; align-items:center; gap:5px; color:var(--text2); font-size:11px; }
  .stat-val { color:var(--accent); font-weight:600; font-family:var(--font); }
  .stat-val.green { color:var(--green); }
  .search-box { flex:1; max-width:280px; background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius); padding:4px 10px; color:var(--text); font-size:12px; font-family:var(--font-ui); outline:none; transition:border-color 0.15s; margin-left:auto; }
  .search-box:focus { border-color:var(--accent); }
  .search-box::placeholder { color:var(--text3); }

  /* Layout */
  .main { flex:1; display:flex; min-height:0; }

  /* Left panel */
  .left-panel { width:300px; flex-shrink:0; border-right:1px solid var(--border); display:flex; flex-direction:column; min-height:0; }
  .panel-header { padding:8px 12px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; flex-shrink:0; }
  .panel-title { font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:0.8px; font-weight:600; }
  .select-all-btn { margin-left:auto; font-size:11px; color:var(--text3); cursor:pointer; padding:2px 6px; border-radius:4px; transition:all 0.15s; }
  .select-all-btn:hover { color:var(--accent); background:var(--accent-glow); }
  .item-list { flex:1; overflow-y:auto; padding:6px 0; }
  .item-list::-webkit-scrollbar { width:4px; }
  .item-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  .list-item { display:flex; align-items:center; gap:8px; padding:6px 12px; cursor:pointer; transition:background 0.1s; border-left:2px solid transparent; }
  .list-item:hover { background:var(--bg3); }
  .list-item.selected { background:var(--select); border-left-color:var(--accent); }
  .list-item.active { background:var(--bg3); }
  .list-item.imported .item-name { color:var(--text2); }

  .item-check { width:14px; height:14px; border:1.5px solid var(--border); border-radius:3px; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
  .list-item.selected .item-check { background:var(--accent); border-color:var(--accent); }
  .item-check svg { display:none; }
  .list-item.selected .item-check svg { display:block; }

  .item-name { flex:1; font-size:12px; color:var(--text); min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .list-item.active .item-name { color:var(--accent); }

  .item-badge { font-size:10px; font-family:var(--font); padding:1px 6px; border-radius:3px; flex-shrink:0; }
  .item-badge.imported { color:var(--green); background:rgba(74,222,128,0.1); border:1px solid rgba(74,222,128,0.25); }

  /* Right panel */
  .right-panel { flex:1; display:flex; flex-direction:column; min-height:0; min-width:0; }
  .detail-container { flex:1; overflow-y:auto; padding:20px 24px; }
  .detail-container::-webkit-scrollbar { width:4px; }
  .detail-container::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  .empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:12px; color:var(--text3); }
  .empty-state svg { opacity:0.3; }
  .empty-state p { font-size:13px; }

  .detail-header { display:flex; align-items:flex-start; gap:16px; margin-bottom:16px; }
  .detail-icon { width:44px; height:44px; border-radius:10px; background:var(--accent-glow); border:1px solid var(--accent2); display:flex; align-items:center; justify-content:center; flex-shrink:0; color:var(--accent); font-family:var(--font); font-size:10px; font-weight:700; text-align:center; line-height:1.3; }
  .detail-icon.agent { background:rgba(245,158,11,0.1); border-color:rgba(245,158,11,0.3); color:var(--amber); }
  .detail-title-group { flex:1; min-width:0; }
  .detail-title { font-size:18px; font-weight:600; color:var(--text); margin-bottom:4px; letter-spacing:-0.3px; }
  .detail-subtitle { font-family:var(--font); font-size:11px; color:var(--text3); }

  .notice { background:rgba(124,106,247,0.08); border:1px solid rgba(124,106,247,0.2); border-radius:var(--radius); padding:10px 14px; font-size:12px; color:var(--text2); line-height:1.6; margin-bottom:16px; }
  .notice strong { color:var(--accent); }
  .notice.agent { background:rgba(245,158,11,0.06); border-color:rgba(245,158,11,0.2); }
  .notice.agent strong { color:var(--amber); }

  /* Agent frontmatter table */
  .fm-table { width:100%; border-collapse:collapse; margin-bottom:16px; font-size:12px; }
  .fm-table td { padding:5px 10px; border:1px solid var(--border); vertical-align:top; }
  .fm-table td:first-child { color:var(--text3); font-family:var(--font); font-size:11px; width:90px; background:var(--bg2); white-space:nowrap; }
  .fm-table td:last-child { color:var(--text); font-family:var(--font); font-size:11px; word-break:break-word; }
  .fm-section { font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--text3); margin-bottom:8px; display:flex; align-items:center; gap:6px; }
  .fm-section::after { content:''; flex:1; height:1px; background:var(--border); }

  /* Bottom bar */
  .bottombar { background:var(--bg2); border-top:1px solid var(--border); padding:10px 16px; display:flex; align-items:center; gap:12px; flex-shrink:0; }
  .selected-count { font-size:12px; color:var(--text2); white-space:nowrap; }
  .selected-count span { color:var(--accent); font-weight:600; font-family:var(--font); }
  .dst-path { background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius); padding:5px 10px; color:var(--text2); font-family:var(--font); font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; }
  .dst-path.set { color:var(--green); border-color:rgba(74,222,128,0.3); }

  /* Toast */
  .toast { position:fixed; bottom:60px; right:20px; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:10px 16px; font-size:12px; color:var(--text); opacity:0; transform:translateY(8px); transition:all 0.2s; pointer-events:none; z-index:100; max-width:360px; }
  .toast.show { opacity:1; transform:translateY(0); }
  .toast.success { border-color:rgba(74,222,128,0.4); color:var(--green); }
  .toast.error   { border-color:rgba(239,68,68,0.4);  color:#f87171; }

  /* Loading */
  .loading { display:flex; align-items:center; justify-content:center; height:100%; gap:10px; color:var(--text3); font-size:12px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .spinner { width:16px; height:16px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }

  /* Markdown */
  .md-body { font-size:13px; line-height:1.7; color:var(--text2); }
  .md-h1 { font-size:16px; font-weight:600; color:var(--text); margin:16px 0 8px; }
  .md-h2 { font-size:14px; font-weight:600; color:var(--text); margin:14px 0 6px; padding-bottom:4px; border-bottom:1px solid var(--border); }
  .md-h3 { font-size:13px; font-weight:600; color:var(--text2); margin:10px 0 4px; }
  .md-p  { margin:4px 0; }
  .md-li { padding:2px 0 2px 16px; position:relative; }
  .md-li::before { content:'·'; position:absolute; left:4px; color:var(--accent); }
  .md-gap { height:6px; }
  .md-hr  { border:none; border-top:1px solid var(--border); margin:12px 0; }
  .md-code { background:var(--bg2); border:1px solid var(--border); border-radius:6px; padding:10px 12px; font-family:var(--font); font-size:11px; color:var(--text2); overflow-x:auto; margin:8px 0; white-space:pre; }
  .md-inline { background:var(--bg3); border:1px solid var(--border); border-radius:3px; padding:1px 5px; font-family:var(--font); font-size:11px; color:var(--accent); }
</style>
</head>
<body>

<!-- Top bar: source directory -->
<div class="topbar">
  <div class="topbar-logo">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
    </svg>
    Claude Code Manager
  </div>
  <div class="topbar-sep"></div>
  <div class="dir-row">
    <span class="dir-label">Source</span>
    <div class="dir-col">
      <div class="dir-path" id="srcPath">No directory selected</div>
      <div class="dir-hint" id="srcHint"></div>
    </div>
    <button class="btn" onclick="selectSrcDir()">Browse…</button>
  </div>
</div>

<!-- Mode tabs -->
<div class="modetabs">
  <div class="modetab active" id="skillsTab" onclick="setMode('skills')">
    <span class="dot"></span> Skills
  </div>
  <div class="modetab" id="agentsTab" onclick="setMode('agents')">
    <span class="dot"></span> Agents
  </div>
</div>

<!-- Stats bar -->
<div class="statsbar">
  <div class="stat">Total <span class="stat-val" id="totalCount">0</span></div>
  <div class="stat">Selected <span class="stat-val" id="selCount">0</span></div>
  <div class="stat">Imported <span class="stat-val green" id="importedCount">—</span></div>
  <input class="search-box" id="searchBox" placeholder="Search…" oninput="filterItems()">
</div>

<!-- Main -->
<div class="main">
  <div class="left-panel">
    <div class="panel-header">
      <span class="panel-title" id="listTitle">Skills</span>
      <span class="select-all-btn" onclick="toggleSelectAll()">Select All / None</span>
    </div>
    <div class="item-list" id="itemList">
      <div class="empty-state">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>
        </svg>
        <p>Select a source directory to begin</p>
      </div>
    </div>
  </div>

  <div class="right-panel">
    <div class="panel-header">
      <span class="panel-title" id="detailTitle">Detail</span>
    </div>
    <div class="detail-container" id="detailContainer">
      <div class="empty-state">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
        <p>Click an item to view details</p>
      </div>
    </div>
  </div>
</div>

<!-- Bottom bar: destination + import -->
<div class="bottombar">
  <div class="selected-count"><span id="selCount2">0</span> selected</div>
  <div class="dir-row">
    <span class="dir-label">Import to</span>
    <div class="dir-col">
      <div class="dst-path" id="dstPath">No destination selected</div>
      <div class="dir-hint" id="dstHint"></div>
    </div>
    <button class="btn" onclick="selectDstDir()">Browse…</button>
  </div>
  <button class="btn-primary" id="importBtn" onclick="importItems()" disabled>Import Selected</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ── State ──
let srcHandle = null;
let dstHandle = null;
let mode = 'skills'; // 'skills' | 'agents'

// Per-mode state
const state = {
  skills: { items: [], selected: new Set(), imported: new Set(), active: null, query: '' },
  agents: { items: [], selected: new Set(), imported: new Set(), active: null, query: '' },
};

function S() { return state[mode]; }

// ── Mode switching ──
function setMode(m) {
  mode = m;
  document.getElementById('skillsTab').classList.toggle('active', m === 'skills');
  document.getElementById('agentsTab').classList.toggle('active', m === 'agents');
  document.getElementById('listTitle').textContent   = m === 'skills' ? 'Skills' : 'Agents';
  document.getElementById('detailTitle').textContent = m === 'skills' ? 'Skill Detail' : 'Agent Detail';
  document.getElementById('searchBox').value = S().query;
  document.getElementById('searchBox').placeholder = m === 'skills' ? 'Search skills…' : 'Search agents…';
  updateStats();
  renderList();
  updateImportBtn();
  // reset detail
  document.getElementById('detailContainer').innerHTML = `
    <div class="empty-state">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
      </svg>
      <p>Click an item to view details</p>
    </div>`;
  // reload dst scan for new mode
  if (dstHandle) scanImported();
}

// ── IndexedDB ──
const DB_NAME = 'ClaudeManager', DB_VER = 1, DB_STORE = 'handles';

function openDB() {
  return new Promise((res, rej) => {
    const r = indexedDB.open(DB_NAME, DB_VER);
    r.onupgradeneeded = e => e.target.result.createObjectStore(DB_STORE);
    r.onsuccess = e => res(e.target.result);
    r.onerror   = e => rej(e.target.error);
  });
}

async function saveHandle(key, handle) {
  try {
    const db = await openDB();
    const tx = db.transaction(DB_STORE, 'readwrite');
    tx.objectStore(DB_STORE).put(handle, key);
    await new Promise(r => tx.oncomplete = r);
  } catch(e) {}
}

async function loadHandle(key) {
  try {
    const db = await openDB();
    return await new Promise((res, rej) => {
      const r = db.transaction(DB_STORE).objectStore(DB_STORE).get(key);
      r.onsuccess = e => res(e.target.result);
      r.onerror   = e => rej(e.target.error);
    });
  } catch(e) { return null; }
}

// ── Dir UI helpers ──
function setSrcUI(name, restored) {
  document.getElementById('srcPath').textContent = name;
  document.getElementById('srcPath').classList.add('set');
  document.getElementById('srcHint').innerHTML =
    `${restored ? 'Restored' : 'Selected'}: <strong>${name}</strong>&nbsp;&nbsp;<span style="color:var(--text3);cursor:pointer" onclick="selectSrcDir()">Change</span>`;
}

function setDstUI(name, restored) {
  document.getElementById('dstPath').textContent = name;
  document.getElementById('dstPath').classList.add('set');
  document.getElementById('dstHint').innerHTML =
    `${restored ? 'Restored' : 'Selected'}: <strong>${name}</strong>&nbsp;&nbsp;<span style="color:var(--text3);cursor:pointer" onclick="selectDstDir()">Change</span>`;
}

async function restoreHandles() {
  const savedSrc = await loadHandle('src');
  if (savedSrc) {
    const perm = await savedSrc.queryPermission({ mode: 'read' }).catch(() => 'denied');
    if (perm === 'granted') {
      srcHandle = savedSrc;
      setSrcUI(srcHandle.name, true);
      await loadItems();
    } else {
      document.getElementById('srcHint').innerHTML =
        `Last used: <strong>${savedSrc.name}</strong>&nbsp;&nbsp;<span style="color:var(--accent);cursor:pointer;text-decoration:underline" onclick="resumeDir('src')">Click to restore</span>`;
    }
  }

  const savedDst = await loadHandle('dst');
  if (savedDst) {
    const perm = await savedDst.queryPermission({ mode: 'readwrite' }).catch(() => 'denied');
    if (perm === 'granted') {
      dstHandle = savedDst;
      setDstUI(dstHandle.name, true);
      updateImportBtn();
      await scanImported();
    } else {
      document.getElementById('dstHint').innerHTML =
        `Last used: <strong>${savedDst.name}</strong>&nbsp;&nbsp;<span style="color:var(--accent);cursor:pointer;text-decoration:underline" onclick="resumeDir('dst')">Click to restore</span>`;
    }
  }
}

async function resumeDir(key) {
  const saved = await loadHandle(key);
  if (!saved) { key === 'src' ? selectSrcDir() : selectDstDir(); return; }
  const mode_ = key === 'src' ? 'read' : 'readwrite';
  const perm = await saved.requestPermission({ mode: mode_ }).catch(() => 'denied');
  if (perm !== 'granted') { key === 'src' ? selectSrcDir() : selectDstDir(); return; }
  if (key === 'src') {
    srcHandle = saved; setSrcUI(srcHandle.name, true); await loadItems();
  } else {
    dstHandle = saved; setDstUI(dstHandle.name, true); updateImportBtn(); await scanImported();
  }
}

async function selectSrcDir() {
  try {
    srcHandle = await window.showDirectoryPicker({ mode: 'read' });
    setSrcUI(srcHandle.name, false);
    await saveHandle('src', srcHandle);
    await loadItems();
  } catch(e) { if (e.name !== 'AbortError') showToast('Cannot open directory: ' + e.message, 'error'); }
}

async function selectDstDir() {
  try {
    dstHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
    setDstUI(dstHandle.name, false);
    await saveHandle('dst', dstHandle);
    updateImportBtn();
    await scanImported();
  } catch(e) { if (e.name !== 'AbortError') showToast('Cannot open directory: ' + e.message, 'error'); }
}

// ── YAML frontmatter parser (minimal) ──
function parseFrontmatter(text) {
  const match = text.match(/^---\r?\n([\s\S]*?)\r?\n---/);
  if (!match) return { meta: {}, body: text };
  const raw = match[1];
  const body = text.slice(match[0].length).trim();
  const meta = {};
  for (const line of raw.split('\n')) {
    const i = line.indexOf(':');
    if (i < 0) continue;
    const k = line.slice(0, i).trim();
    const v = line.slice(i + 1).trim().replace(/^['"]|['"]$/g, '');
    meta[k] = v;
  }
  return { meta, body };
}

// ── Loading ──
async function loadItems() {
  const listEl = document.getElementById('itemList');
  listEl.innerHTML = '<div class="loading"><div class="spinner"></div>Scanning…</div>';

  // load both modes in parallel
  await Promise.all([loadMode('skills'), loadMode('agents')]);

  updateStats();
  renderList();
}

async function loadMode(m) {
  state[m].items = [];
  if (!srcHandle) return;
  try {
    for await (const [name, handle] of srcHandle.entries()) {
      if (handle.kind === 'directory') {
        // Skills: subdirs with SKILL.md
        try {
          const file = await (await handle.getFileHandle('SKILL.md')).getFile();
          const content = await file.text();
          if (m === 'skills') {
            const nm = name.match(/^ln-\d+-(.+)$/);
            state.skills.items.push({ name: nm ? nm[1] : name, dirName: name, content, type: 'skill' });
          }
        } catch(e) {
          // Agents: subdirs with a single .md file containing frontmatter
          if (m === 'agents') {
            try {
              for await (const [fname, fhandle] of handle.entries()) {
                if (fhandle.kind === 'file' && fname.endsWith('.md')) {
                  const file = await fhandle.getFile();
                  const content = await file.text();
                  const { meta, body } = parseFrontmatter(content);
                  if (meta.name || meta.description) {
                    state.agents.items.push({
                      name: meta.name || fname.replace(/\.md$/, ''),
                      dirName: name,
                      fileName: fname,
                      content, meta, body, type: 'agent'
                    });
                    break;
                  }
                }
              }
            } catch(e2) {}
          }
        }
      } else if (handle.kind === 'file' && name.endsWith('.md') && m === 'agents') {
        // Agents: flat .md files with frontmatter at top level
        try {
          const file = await handle.getFile();
          const content = await file.text();
          const { meta, body } = parseFrontmatter(content);
          if (meta.name || meta.description) {
            state.agents.items.push({
              name: meta.name || name.replace(/\.md$/, ''),
              dirName: name,
              fileName: name,
              content, meta, body, type: 'agent'
            });
          }
        } catch(e) {}
      }
    }
  } catch(e) {}

  state[m].items.sort((a, b) => a.dirName.localeCompare(b.dirName, undefined, { numeric: true }));
}

// ── Scan imported ──
async function scanImported() {
  state.skills.imported.clear();
  state.agents.imported.clear();
  if (!dstHandle) { updateStats(); return; }
  try {
    for await (const [name, handle] of dstHandle.entries()) {
      if (handle.kind === 'file' && name.endsWith('.md'))
        state.skills.imported.add(name.slice(0, -3));
    }
    // agents share same dst dir structure — same scan
    state.agents.imported = new Set(state.skills.imported);
  } catch(e) {}
  updateStats();
  renderList();
}

// ── Stats ──
function updateStats() {
  const s = S();
  document.getElementById('totalCount').textContent    = s.items.length;
  document.getElementById('selCount').textContent      = s.selected.size;
  document.getElementById('selCount2').textContent     = s.selected.size;
  document.getElementById('importedCount').textContent = dstHandle ? s.imported.size : '—';
}

// ── List rendering ──
function filterItems() {
  S().query = document.getElementById('searchBox').value.toLowerCase();
  renderList();
}

function getFiltered() {
  const q = S().query;
  return q ? S().items.filter(i => i.name.includes(q) || i.dirName.includes(q)) : S().items;
}

function renderList() {
  const listEl = document.getElementById('itemList');
  const filtered = getFiltered();

  if (!filtered.length) {
    listEl.innerHTML = S().items.length
      ? '<div class="empty-state"><p>No matching items</p></div>'
      : '<div class="empty-state"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg><p>Select a source directory to begin</p></div>';
    updateStats();
    return;
  }

  listEl.innerHTML = '';
  const s = S();
  filtered.forEach(item => {
    const isImported = s.imported.has(item.name);
    const el = document.createElement('div');
    el.className = 'list-item'
      + (s.selected.has(item.dirName) ? ' selected' : '')
      + (s.active === item.dirName    ? ' active'   : '')
      + (isImported                   ? ' imported' : '');
    el.innerHTML = `
      <div class="item-check">
        <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
          <polyline points="2,6 5,9 10,3"/>
        </svg>
      </div>
      <span class="item-name">${item.name}</span>
      ${isImported ? '<span class="item-badge imported">imported</span>' : ''}`;

    el.addEventListener('click', e => {
      const r = el.querySelector('.item-check').getBoundingClientRect();
      if (e.clientX >= r.left && e.clientX <= r.right) {
        toggleSelect(item.dirName);
      } else {
        showDetail(item);
        s.active = item.dirName;
        renderList();
      }
    });
    listEl.appendChild(el);
  });
  updateStats();
}

function toggleSelect(dirName) {
  const sel = S().selected;
  sel.has(dirName) ? sel.delete(dirName) : sel.add(dirName);
  updateImportBtn();
  renderList();
}

function toggleSelectAll() {
  const filtered = getFiltered();
  const sel = S().selected;
  const allSel = filtered.every(i => sel.has(i.dirName));
  filtered.forEach(i => allSel ? sel.delete(i.dirName) : sel.add(i.dirName));
  updateImportBtn();
  renderList();
}

function updateImportBtn() {
  document.getElementById('importBtn').disabled = !S().selected.size || !dstHandle;
}

// ── Markdown renderer ──
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function inline(s) {
  return esc(s)
    .replace(/`([^`]+)`/g,       '<code class="md-inline">$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g,     '<em>$1</em>');
}
function renderMarkdown(text) {
  let html = '', inCode = false, codeBuf = '';
  for (const line of text.split('\n')) {
    if (line.startsWith('```')) {
      if (inCode) { html += `<pre class="md-code">${esc(codeBuf.trimEnd())}</pre>`; codeBuf = ''; inCode = false; }
      else inCode = true; continue;
    }
    if (inCode)                   { codeBuf += line + '\n'; continue; }
    if (line.startsWith('#### ')) { html += `<h3 class="md-h3">${esc(line.slice(5))}</h3>`; continue; }
    if (line.startsWith('### '))  { html += `<h3 class="md-h3">${esc(line.slice(4))}</h3>`; continue; }
    if (line.startsWith('## '))   { html += `<h2 class="md-h2">${esc(line.slice(3))}</h2>`; continue; }
    if (line.startsWith('# '))    { html += `<h1 class="md-h1">${esc(line.slice(2))}</h1>`; continue; }
    if (line.match(/^[-*] /))     { html += `<div class="md-li">${inline(line.slice(2))}</div>`; continue; }
    if (line.match(/^\d+\. /))    { html += `<div class="md-li">${inline(line.replace(/^\d+\. /,''))}</div>`; continue; }
    if (line.startsWith('---'))   { html += `<hr class="md-hr">`; continue; }
    if (!line.trim())             { html += `<div class="md-gap"></div>`; continue; }
    html += `<p class="md-p">${inline(line)}</p>`;
  }
  if (inCode) html += `<pre class="md-code">${esc(codeBuf)}</pre>`;
  return html;
}

// ── Detail view ──
function showDetail(item) {
  const el = document.getElementById('detailContainer');

  if (item.type === 'skill') {
    el.innerHTML = `
      <div class="detail-header">
        <div class="detail-icon">SK</div>
        <div class="detail-title-group">
          <div class="detail-title">${item.name}</div>
          <div class="detail-subtitle">${item.dirName} / SKILL.md</div>
        </div>
      </div>
      <div class="notice">Command: <strong>/${item.name}</strong> &nbsp;·&nbsp; Imported as: <strong>${item.name}.md</strong></div>
      <div class="md-body">${renderMarkdown(item.content)}</div>`;
    return;
  }

  // Agent detail
  const m = item.meta;
  const fmRows = [
    ['name',        m.name],
    ['description', m.description],
    ['model',       m.model],
    ['tools',       m.tools],
    ['color',       m.color],
  ].filter(([, v]) => v);

  el.innerHTML = `
    <div class="detail-header">
      <div class="detail-icon agent">AG</div>
      <div class="detail-title-group">
        <div class="detail-title">${item.name}</div>
        <div class="detail-subtitle">${item.dirName}${item.fileName && item.fileName !== item.dirName ? ' / ' + item.fileName : ''}</div>
      </div>
    </div>
    <div class="notice agent">Invocation: <strong>@${item.name}</strong> &nbsp;·&nbsp; Imported as: <strong>${item.name}.md</strong></div>
    ${fmRows.length ? `
    <div class="fm-section">Frontmatter</div>
    <table class="fm-table">${fmRows.map(([k,v]) => `<tr><td>${k}</td><td>${esc(v)}</td></tr>`).join('')}</table>` : ''}
    ${item.body ? `<div class="fm-section">System Prompt</div><div class="md-body">${renderMarkdown(item.body)}</div>` : ''}`;
}

// ── Import ──
async function importItems() {
  const s = S();
  if (!dstHandle || !s.selected.size) return;

  // Check overwrites
  const toOverwrite = [...s.selected]
    .map(d => s.items.find(i => i.dirName === d))
    .filter(i => i && s.imported.has(i.name))
    .map(i => i.name);

  if (toOverwrite.length) {
    const list = toOverwrite.slice(0, 5).join(', ') + (toOverwrite.length > 5 ? ` … (+${toOverwrite.length - 5} more)` : '');
    if (!confirm(`${toOverwrite.length} item(s) already imported will be overwritten:\n\n${list}\n\nContinue?`)) return;
  }

  const btn = document.getElementById('importBtn');
  btn.disabled = true; btn.textContent = 'Importing…';
  let ok = 0, fail = 0;

  for (const dirName of s.selected) {
    const item = s.items.find(i => i.dirName === dirName);
    if (!item?.content) { fail++; continue; }
    try {
      const fh = await dstHandle.getFileHandle(item.name + '.md', { create: true });
      const w  = await fh.createWritable();
      await w.write(item.content); await w.close();
      ok++;
    } catch(e) { fail++; }
  }

  btn.disabled = false; btn.textContent = 'Import Selected';
  showToast(
    fail === 0 ? `✓ Imported ${ok} item(s) to ${dstHandle.name}` : `Done: ${ok} succeeded, ${fail} failed`,
    fail === 0 ? 'success' : 'error'
  );
  await scanImported();
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast show ${type}`;
  setTimeout(() => t.className = 'toast', 3000);
}

if (!window.showDirectoryPicker) {
  document.body.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;color:#8b90b0;font-family:sans-serif"><div style="font-size:18px;color:#e2e4f0">File System Access API not supported</div><div style="font-size:13px">Please open this file in Chrome 86+ or Edge 86+</div></div>`;
} else {
  restoreHandles();
}
</script>
